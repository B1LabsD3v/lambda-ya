name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scaffold-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layout: handlers
            api: v1
          - layout: handlers
            api: v2
          - layout: modular
            api: v1
          - layout: modular
            api: v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Scaffold ${{ matrix.layout }} (API ${{ matrix.api }}) and build
        run: |
          OUT="_ci-${{ matrix.layout }}-${{ matrix.api }}"
          node bin/lambda-ya.js ${{ matrix.layout }} "$OUT" --yes --no-terraform --skip-install --api-gateway=${{ matrix.api }}
          cd "$OUT" && npm install && npm run build && node __test__/test-local.js
