name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scaffold-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Scaffold handlers (no Terraform) and build
        run: |
          node bin/lambda-ya.js handlers _ci-handlers --yes --no-terraform --skip-install
          cd _ci-handlers && npm install && npm run build && node __test__/test-local.js
      - name: Scaffold modular (no Terraform) and build
        run: |
          node bin/lambda-ya.js modular _ci-modular --yes --no-terraform --skip-install
          cd _ci-modular && npm install && npm run build && node __test__/test-local.js
